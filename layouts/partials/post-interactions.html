<div class="post-interactions">

  {{- $prompt := .Params.discussionPrompt | default "" }}

  <div class="interaction-row">
    <div class="reaction-chips" data-url="{{ .RelPermalink }}" aria-label="React to this post">
      <span class="reaction-label">React</span>
      <button class="chip" data-reaction="sparked" aria-pressed="false">💡 Sparked an idea</button>
      <button class="chip" data-reaction="relevant" aria-pressed="false">🔥 Relevant to me</button>
      <button class="chip" data-reaction="argued" aria-pressed="false">👏 Well argued</button>
      <button class="chip" data-reaction="pushback" aria-pressed="false">🤔 I'd push back</button>
    </div>

    <div class="share-group">
      <span class="share-label">Share</span>
      <a class="share-btn"
         href="https://twitter.com/intent/tweet?text={{ .Title | urlquery }}&url={{ .Permalink | urlquery }}"
         target="_blank" rel="noopener noreferrer">X / Twitter</a>
      <a class="share-btn"
         href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}"
         target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <button class="share-btn share-copy" data-url="{{ .Permalink }}">Copy link</button>
    </div>
  </div>

  <div class="comments-section">
    <h3 class="comments-heading">Discussion</h3>
    {{- if $prompt }}
    <p class="discussion-prompt">{{ $prompt }}</p>
    {{- else }}
    <p class="comments-sub">Have a question or a different take? Drop a comment below. GitHub account required.</p>
    {{- end }}
    <script src="https://giscus.app/client.js"
      data-repo="SulagnaSasmal/blog"
      data-repo-id="R_kgDORpyPjA"
      data-category="General"
      data-category-id="DIC_kwDORpyPjM4C4rSl"
      data-mapping="pathname"
      data-strict="0"
      data-reactions-enabled="1"
      data-emit-metadata="0"
      data-input-position="top"
      data-theme="preferred_color_scheme"
      data-lang="en"
      crossorigin="anonymous"
      async>
    </script>
    <noscript>
      <p class="comments-fallback">
        Comments require JavaScript. You can also
        <a href="mailto:sulagna@sulagnasasmal.com?subject=Re: {{ .Title | urlquery }}">reply by email</a>.
      </p>
    </noscript>
  </div>

</div>
