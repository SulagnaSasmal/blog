baseURL = "https://sulagnasasmal.github.io/blog/"
languageCode = "en-us"
timeZone = "Asia/Kolkata"
title = "Sulagna Sasmal"
theme = "PaperMod"

[params]
  author = "Sulagna Sasmal"
  description = "Technical writing, docs strategy, and the craft of clarity."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"   # respects OS dark/light preference

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
    apple_touch_icon = "favicon.svg"
    safari_pinned_tab = "safari-pinned-tab.svg"
    theme_color = "#b46836"
    msapplication_TileColor = "#b46836"

  [params.footer]
    text = "[Portfolio](https://sulagnasasmal.com/)"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Portfolio"
    url = "https://sulagnasasmal.com/"
    weight = 3

[pagination]
  pagerSize = 10
