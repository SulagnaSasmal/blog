<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F1"/>
      <stop offset="1" stop-color="#F1E8DB"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D78F5A"/>
      <stop offset="1" stop-color="#B46836"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2E9A93"/>
      <stop offset="1" stop-color="#0D7A74"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="20" fill="url(#bg2)"/>

  <!-- Header -->
  <text x="36" y="30" fill="#6E5645" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">FRAGMENTED VS INTEGRATED</text>
  <text x="36" y="56" fill="#1C1712" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Why the current docs stack still feels broken</text>

  <!-- LEFT PANEL: Today (x=36, w=356, y=68, h=256) -->
  <rect x="36" y="68" width="356" height="256" rx="14" fill="#FFFCF9"/>

  <!-- Panel header accent bar -->
  <rect x="36" y="68" width="356" height="6" rx="0" fill="url(#warm)"/>
  <rect x="36" y="68" width="356" height="6" rx="14" fill="url(#warm)"/>

  <text x="52" y="94" fill="#A05E32" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">TODAY</text>
  <text x="52" y="114" fill="#1C1712" font-family="Georgia, serif" font-size="17" font-weight="700">Patchwork toolchain</text>

  <!-- Tool boxes row 1: Writer+Git (x=52), Style Linter (x=210) -->
  <rect x="52" y="126" width="130" height="40" rx="10" fill="url(#warm)"/>
  <text x="68" y="151" fill="#FFF4EA" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Writer + Git</text>

  <rect x="210" y="126" width="130" height="40" rx="10" fill="#F1E1D2"/>
  <text x="228" y="151" fill="#5B4C40" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Style Linter</text>

  <!-- Tool boxes row 2: CI/CD (x=52), Static Site (x=198), Analytics (x=284 won't fit — use 3 evenly) -->
  <!-- 3 tools at 98px each with 12px gaps = 3*98+2*12 = 318px. Left: 52, so right: 52+318=370 = 36+356-22. Close enough. -->
  <rect x="52" y="188" width="98" height="40" rx="10" fill="#F1E1D2"/>
  <text x="68" y="213" fill="#5B4C40" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">CI/CD</text>

  <rect x="162" y="188" width="98" height="40" rx="10" fill="#F1E1D2"/>
  <text x="172" y="213" fill="#5B4C40" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Static Site</text>

  <rect x="272" y="188" width="98" height="40" rx="10" fill="#F1E1D2"/>
  <text x="285" y="213" fill="#5B4C40" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Analytics</text>

  <!-- Dashed connectors -->
  <line x1="182" y1="146" x2="210" y2="146" stroke="#D2A785" stroke-width="2.5" stroke-dasharray="5 7"/>
  <line x1="117" y1="166" x2="101" y2="188" stroke="#D2A785" stroke-width="2.5" stroke-dasharray="5 7"/>
  <line x1="275" y1="166" x2="211" y2="188" stroke="#D2A785" stroke-width="2.5" stroke-dasharray="5 7"/>
  <line x1="150" y1="208" x2="162" y2="208" stroke="#D2A785" stroke-width="2.5" stroke-dasharray="5 7"/>
  <line x1="260" y1="208" x2="272" y2="208" stroke="#D2A785" stroke-width="2.5" stroke-dasharray="5 7"/>

  <!-- Outcome text -->
  <text x="52" y="252" fill="#7A6050" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <tspan x="52" dy="0">Brittle handoffs · tribal knowledge</tspan>
    <tspan x="52" dy="16">· no single operational view</tspan>
  </text>

  <!-- RIGHT PANEL: DocForge (x=408, w=356, y=68, h=256) -->
  <rect x="408" y="68" width="356" height="256" rx="14" fill="#FFFCF9"/>

  <!-- Panel header accent bar -->
  <rect x="408" y="68" width="356" height="6" rx="14" fill="url(#cool)"/>

  <text x="424" y="94" fill="#0D7A74" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">DOCFORGE</text>
  <text x="424" y="114" fill="#1C1712" font-family="Georgia, serif" font-size="17" font-weight="700">Integrated documentation platform</text>

  <!-- Unified teal platform box -->
  <rect x="424" y="126" width="324" height="108" rx="12" fill="url(#cool)"/>

  <!-- 6 module chips: 3 per row, w=92 each, gap=12 -->
  <!-- Row 1: x=436, 540, 644; y=136 -->
  <rect x="436" y="136" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="450" y="157" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Dashboard</text>

  <rect x="540" y="136" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="562" y="157" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Editor</text>

  <rect x="644" y="136" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="669" y="157" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Map</text>

  <!-- Row 2: y=180 -->
  <rect x="436" y="180" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="453" y="201" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Linter</text>

  <rect x="540" y="180" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="551" y="201" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Outputs</text>

  <rect x="644" y="180" width="92" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="660" y="201" fill="#E8FFFE" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700">Config</text>

  <!-- "One source" chip -->
  <rect x="424" y="248" width="324" height="44" rx="10" fill="#E6F6F3"/>
  <text x="444" y="266" fill="#195851" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">One source of truth. One system of checks.</text>
  <text x="444" y="283" fill="#195851" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">One operational view.</text>

  <!-- Footer caption -->
  <text x="36" y="346" fill="#6C5A4D" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <tspan x="36" dy="0">The gap is not a missing feature. It is the absence of an orchestration layer built specifically for documentation teams.</tspan>
  </text>
  <text x="36" y="365" fill="#6C5A4D" font-family="Segoe UI, Arial, sans-serif" font-size="12">Teams are forced to become the integration layer themselves.</text>
</svg>
