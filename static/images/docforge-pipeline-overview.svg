<svg width="800" height="360" viewBox="0 0 800 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7EC"/>
      <stop offset="1" stop-color="#F4EBDE"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B46836"/>
      <stop offset="1" stop-color="#D89F49"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0D7A74"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" rx="20" fill="url(#bg)"/>

  <!-- Header -->
  <text x="36" y="30" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">DOCFORGE PIPELINE</text>
  <text x="36" y="56" fill="#1C1712" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">From source content to reader-facing output</text>

  <!-- 5 stage cards: y=70, h=172, each w=136, gap=12 -->
  <!-- x positions: 36, 184, 332, 480, 628 -->

  <!-- Card 1: Source -->
  <rect x="36" y="70" width="136" height="172" rx="14" fill="#FFFCF9"/>
  <rect x="52" y="86" width="36" height="36" rx="10" fill="url(#warm)"/>
  <path d="M62 98H78" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M62 105H82" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M62 112H76" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <text x="52" y="144" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">01</text>
  <text x="52" y="162" fill="#1C1712" font-family="Georgia, serif" font-size="16" font-weight="700">Source</text>
  <text x="52" y="179" fill="#5A4E43" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
    <tspan x="52" dy="0">Markdown, YAML</tspan>
    <tspan x="52" dy="15">frontmatter,</tspan>
    <tspan x="52" dy="15">version metadata.</tspan>
  </text>

  <!-- Arrow 1→2 -->
  <line x1="174" y1="156" x2="182" y2="156" stroke="#D3B494" stroke-width="4" stroke-linecap="round"/>
  <path d="M178 151L184 156L178 161" stroke="#D3B494" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2: Structure -->
  <rect x="184" y="70" width="136" height="172" rx="14" fill="#FFFCF9"/>
  <rect x="200" y="86" width="36" height="36" rx="10" fill="url(#cool)"/>
  <path d="M212 104H222" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M218 96V112" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <text x="200" y="144" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">02</text>
  <text x="200" y="162" fill="#1C1712" font-family="Georgia, serif" font-size="16" font-weight="700">Structure</text>
  <text x="200" y="179" fill="#5A4E43" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
    <tspan x="200" dy="0">DITA topic typing,</tspan>
    <tspan x="200" dy="15">taxonomy, content</tspan>
    <tspan x="200" dy="15">relationships.</tspan>
  </text>

  <!-- Arrow 2→3 -->
  <line x1="322" y1="156" x2="330" y2="156" stroke="#9BCBC1" stroke-width="4" stroke-linecap="round"/>
  <path d="M326 151L332 156L326 161" stroke="#9BCBC1" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3: Quality -->
  <rect x="332" y="70" width="136" height="172" rx="14" fill="#FFFCF9"/>
  <rect x="348" y="86" width="36" height="36" rx="10" fill="url(#warm)"/>
  <path d="M358 110L364 117L377 102" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="144" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">03</text>
  <text x="348" y="162" fill="#1C1712" font-family="Georgia, serif" font-size="16" font-weight="700">Quality</text>
  <text x="348" y="179" fill="#5A4E43" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
    <tspan x="348" dy="0">Vale linting, style</tspan>
    <tspan x="348" dy="15">guide checks,</tspan>
    <tspan x="348" dy="15">readability gates.</tspan>
  </text>

  <!-- Arrow 3→4 -->
  <line x1="470" y1="156" x2="478" y2="156" stroke="#D3B494" stroke-width="4" stroke-linecap="round"/>
  <path d="M474 151L480 156L474 161" stroke="#D3B494" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 4: Build -->
  <rect x="480" y="70" width="136" height="172" rx="14" fill="#FFFCF9"/>
  <rect x="496" y="86" width="36" height="36" rx="10" fill="url(#cool)"/>
  <path d="M506 104H520" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M516 96L526 104L516 112" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="496" y="144" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">04</text>
  <text x="496" y="162" fill="#1C1712" font-family="Georgia, serif" font-size="16" font-weight="700">Build</text>
  <text x="496" y="179" fill="#5A4E43" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
    <tspan x="496" dy="0">HTML, PDF, API</tspan>
    <tspan x="496" dy="15">specs, schemas,</tspan>
    <tspan x="496" dy="15">changelogs.</tspan>
  </text>

  <!-- Arrow 4→5 -->
  <line x1="618" y1="156" x2="626" y2="156" stroke="#9BCBC1" stroke-width="4" stroke-linecap="round"/>
  <path d="M622 151L628 156L622 161" stroke="#9BCBC1" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 5: Publish -->
  <rect x="628" y="70" width="136" height="172" rx="14" fill="#FFFCF9"/>
  <rect x="644" y="86" width="36" height="36" rx="10" fill="url(#warm)"/>
  <rect x="652" y="94" width="20" height="14" rx="2.5" stroke="white" stroke-width="4" fill="none"/>
  <path d="M662 108V116" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M656 116H668" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <text x="644" y="144" fill="#8C6E56" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">05</text>
  <text x="644" y="162" fill="#1C1712" font-family="Georgia, serif" font-size="16" font-weight="700">Publish</text>
  <text x="644" y="179" fill="#5A4E43" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
    <tspan x="644" dy="0">Deploy, analytics,</tspan>
    <tspan x="644" dy="15">governance,</tspan>
    <tspan x="644" dy="15">versioning.</tspan>
  </text>

  <!-- Footer dark band -->
  <rect x="36" y="260" width="728" height="78" rx="12" fill="#1E1914" fill-opacity="0.94"/>
  <text x="56" y="285" fill="#F9EFE3" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="700">The point of the prototype</text>
  <text x="56" y="305" fill="#D8C7B5" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <tspan x="56" dy="0">Most teams already have pieces of this stack. The gap is the orchestration layer</tspan>
    <tspan x="56" dy="17">that makes them behave like one coherent documentation product.</tspan>
  </text>
</svg>
