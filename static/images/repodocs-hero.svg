<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .coral-fill { fill: #FAECE7; stroke: #993C1D; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .coral-title { fill: #712B13; font-weight: 500; font-size: 14px; font-family: sans-serif; }
    .coral-sub { fill: #993C1D; font-size: 12px; font-family: sans-serif; }
    .teal-title { fill: #085041; font-weight: 500; font-size: 14px; font-family: sans-serif; }
    .teal-sub { fill: #0F6E56; font-size: 12px; font-family: sans-serif; }
    .purple-title { fill: #3C3489; font-weight: 500; font-size: 14px; font-family: sans-serif; }
    .purple-sub { fill: #534AB7; font-size: 12px; font-family: sans-serif; }
    .danger { fill: #A32D2D; font-size: 12px; font-family: sans-serif; }
    .arr { stroke: #888780; fill: none; stroke-width: 1.2; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5" class="coral-fill"/>
  <text x="110" y="65" text-anchor="middle" class="coral-title">Payments API</text>
  <text x="110" y="83" text-anchor="middle" class="coral-sub">Service A</text>
  <rect x="270" y="40" width="140" height="56" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text x="340" y="65" text-anchor="middle" class="teal-title">Auth API</text>
  <text x="340" y="83" text-anchor="middle" class="teal-sub">Service B</text>
  <rect x="500" y="40" width="140" height="56" rx="8" stroke-width="0.5" class="purple-fill"/>
  <text x="570" y="65" text-anchor="middle" class="purple-title">Orders API</text>
  <text x="570" y="83" text-anchor="middle" class="purple-sub">Service C</text>
  <rect x="40" y="160" width="140" height="80" rx="6" stroke-width="0.5" class="coral-fill"/>
  <text x="110" y="186" text-anchor="middle" class="coral-sub">Confluence page</text>
  <text x="110" y="204" text-anchor="middle" class="coral-sub">No template</text>
  <text x="110" y="222" text-anchor="middle" class="coral-sub">Last updated: ?</text>
  <rect x="270" y="160" width="140" height="80" rx="6" stroke-width="0.5" class="teal-fill"/>
  <text x="340" y="186" text-anchor="middle" class="teal-sub">README.md</text>
  <text x="340" y="204" text-anchor="middle" class="teal-sub">Different format</text>
  <text x="340" y="222" text-anchor="middle" class="teal-sub">No validation</text>
  <rect x="500" y="160" width="140" height="80" rx="6" stroke-width="0.5" class="purple-fill"/>
  <text x="570" y="186" text-anchor="middle" class="purple-sub">Word doc</text>
  <text x="570" y="204" text-anchor="middle" class="purple-sub">Emailed around</text>
  <text x="570" y="222" text-anchor="middle" class="purple-sub">Out of date</text>
  <line x1="110" y1="96" x2="110" y2="158" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="96" x2="340" y2="158" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="570" y1="96" x2="570" y2="158" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="180" y1="200" x2="268" y2="200" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="412" y1="200" x2="498" y2="200" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="229" y="196" text-anchor="middle" class="danger">no sync</text>
  <text x="455" y="196" text-anchor="middle" class="danger">no sync</text>
