<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header-fill { fill: #F1EFE8; stroke: #5F5E5A; }
    .row-teal { fill: #E1F5EE; stroke: #0F6E56; }
    .row-blue { fill: #E6F1FB; stroke: #185FA5; }
    .header-text { font-weight: 500; font-size: 14px; font-family: sans-serif; fill: #444441; }
    .teal-text { font-size: 14px; font-family: sans-serif; fill: #085041; }
    .teal-bold { font-weight: 500; font-size: 14px; font-family: sans-serif; fill: #085041; }
    .teal-sub { font-size: 12px; font-family: sans-serif; fill: #0F6E56; }
    .blue-text { font-size: 14px; font-family: sans-serif; fill: #0C447C; }
    .blue-bold { font-weight: 500; font-size: 14px; font-family: sans-serif; fill: #0C447C; }
    .blue-sub { font-size: 12px; font-family: sans-serif; fill: #185FA5; }
  </style>
  <rect x="40" y="30" width="600" height="44" rx="8" stroke-width="0.5" class="header-fill"/>
  <text x="160" y="52" text-anchor="middle" class="header-text">Category</text>
  <text x="420" y="52" text-anchor="middle" class="header-text">Score</text>
  <text x="570" y="52" text-anchor="middle" class="header-text">Out of 10</text>
  <rect x="40" y="82" width="600" height="40" rx="0" stroke-width="0.5" class="row-teal"/>
  <text x="160" y="102" text-anchor="middle" class="teal-text">Clarity</text>
  <text x="420" y="102" text-anchor="middle" class="teal-bold">8</text>
  <text x="570" y="102" text-anchor="middle" class="teal-sub">Pass</text>
  <rect x="40" y="130" width="600" height="40" rx="0" stroke-width="0.5" class="row-blue"/>
  <text x="160" y="150" text-anchor="middle" class="blue-text">Ease of use</text>
  <text x="420" y="150" text-anchor="middle" class="blue-bold">7</text>
  <text x="570" y="150" text-anchor="middle" class="blue-sub">Pass</text>
  <rect x="40" y="178" width="600" height="40" rx="0" stroke-width="0.5" class="row-teal"/>
  <text x="160" y="198" text-anchor="middle" class="teal-text">Documentation quality</text>
  <text x="420" y="198" text-anchor="middle" class="teal-bold">9</text>
  <text x="570" y="198" text-anchor="middle" class="teal-sub">Pass</text>
  <rect x="40" y="226" width="600" height="40" rx="8" stroke-width="0.5" class="row-blue"/>
  <text x="160" y="246" text-anchor="middle" class="blue-text">AI usefulness</text>
  <text x="420" y="246" text-anchor="middle" class="blue-bold">7</text>
  <text x="570" y="246" text-anchor="middle" class="blue-sub">Pass</text>
</svg>
