<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The Monday-morning diagnostic: a four-step process for finding the disclosure gap</title>
<desc>A four-step process shown top to bottom. Step one: pick one concept that appears on at least three surfaces, with destructive actions as the recommended starting point. Step two: open four tabs — docs, product UI, onboarding, and chatbot — each labelled. Step three: check whether the qualifier word survived across all four. Step four: diagnose the outcome as healthy system, content drift, or system failure based on how many surfaces preserved the qualifier.</desc>
<style>
.t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2C2C2A; }
.ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5F5E5A; }
.th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.c-gray rect { fill: #F1EFE8; stroke: #888780; }
.c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-coral rect { fill: #FAECE7; stroke: #993C1D; }
.c-amber .th, .c-amber .t, .c-amber .ts { fill: #633806; }
.c-blue .th, .c-blue .t, .c-blue .ts { fill: #0C447C; }
.c-teal .th, .c-teal .t, .c-teal .ts { fill: #085041; }
.c-purple .th, .c-purple .t, .c-purple .ts { fill: #3C3489; }
.c-coral .th, .c-coral .t, .c-coral .ts { fill: #712B13; }
@media (prefers-color-scheme: dark) {
.t { fill: #D3D1C7; }
.ts { fill: #B4B2A9; }
.th { fill: #D3D1C7; }
.c-gray rect { fill: #2C2C2A; stroke: #B4B2A9; }
.c-amber rect { fill: #633806; stroke: #FAC775; }
.c-blue rect { fill: #0C447C; stroke: #B5D4F4; }
.c-teal rect { fill: #085041; stroke: #9FE1CB; }
.c-purple rect { fill: #3C3489; stroke: #CECBF6; }
.c-coral rect { fill: #712B13; stroke: #F5C4B3; }
.c-amber .th, .c-amber .t, .c-amber .ts { fill: #FAEEDA; }
.c-blue .th, .c-blue .t, .c-blue .ts { fill: #E6F1FB; }
.c-teal .th, .c-teal .t, .c-teal .ts { fill: #E1F5EE; }
.c-purple .th, .c-purple .t, .c-purple .ts { fill: #EEEDFE; }
.c-coral .th, .c-coral .t, .c-coral .ts { fill: #FAECE7; }
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="30">A 15-minute diagnostic for finding the disclosure gap in your product</text>

<g class="c-gray"><rect x="40" y="54" width="28" height="28" rx="14" stroke-width="0.5"/></g>
<text class="th" x="54" y="74" text-anchor="middle">1</text>
<text class="th" x="84" y="74">Pick one concept</text>

<g class="c-amber"><rect x="40" y="96" width="600" height="70" rx="8" stroke-width="0.5"/></g>
<text class="t" x="60" y="122">One concept in your product that appears on at least three surfaces.</text>
<text class="ts" x="60" y="144">Destructive actions are the best starting point. The stakes make the disclosure problem visible.</text>

<line x1="340" y1="176" x2="340" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="210" width="28" height="28" rx="14" stroke-width="0.5"/></g>
<text class="th" x="54" y="230" text-anchor="middle">2</text>
<text class="th" x="84" y="230">Open four tabs</text>

<g class="c-blue"><rect x="40" y="252" width="140" height="90" rx="8" stroke-width="0.5"/></g>
<text class="ts" x="54" y="274">Tab 1</text>
<text class="th" x="54" y="294">Docs page</text>
<text class="ts" x="54" y="316">Find the core</text>
<text class="ts" x="54" y="332">defining sentence</text>

<g class="c-teal"><rect x="192" y="252" width="140" height="90" rx="8" stroke-width="0.5"/></g>
<text class="ts" x="206" y="274">Tab 2</text>
<text class="th" x="206" y="294">Product UI</text>
<text class="ts" x="206" y="316">Screenshot the</text>
<text class="ts" x="206" y="332">tooltip and dialog</text>

<g class="c-purple"><rect x="344" y="252" width="140" height="90" rx="8" stroke-width="0.5"/></g>
<text class="ts" x="358" y="274">Tab 3</text>
<text class="th" x="358" y="294">Onboarding</text>
<text class="ts" x="358" y="316">Write the sentence</text>
<text class="ts" x="358" y="332">introducing it</text>

<g class="c-coral"><rect x="496" y="252" width="144" height="90" rx="8" stroke-width="0.5"/></g>
<text class="ts" x="510" y="274">Tab 4</text>
<text class="th" x="510" y="294">Chatbot</text>
<text class="ts" x="510" y="316">Ask a plausible</text>
<text class="ts" x="510" y="332">user question</text>

<line x1="340" y1="352" x2="340" y2="376" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="386" width="28" height="28" rx="14" stroke-width="0.5"/></g>
<text class="th" x="54" y="406" text-anchor="middle">3</text>
<text class="th" x="84" y="406">Check the qualifier</text>

<g class="c-amber"><rect x="40" y="428" width="600" height="80" rx="8" stroke-width="0.5"/></g>
<text class="t" x="60" y="454">Find the word or phrase in the docs version that carries the warning,</text>
<text class="t" x="60" y="472">the condition, or the causal link.</text>
<text class="ts" x="60" y="494">Example: in "deleting this may impact downstream models," the load-bearing words are "may impact."</text>

<line x1="340" y1="518" x2="340" y2="542" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="552" width="28" height="28" rx="14" stroke-width="0.5"/></g>
<text class="th" x="54" y="572" text-anchor="middle">4</text>
<text class="th" x="84" y="572">Diagnose the gap</text>

<g class="c-teal"><rect x="40" y="594" width="195" height="72" rx="8" stroke-width="0.5"/></g>
<text class="th" x="60" y="618">Survived on all four</text>
<text class="ts" x="60" y="638">Healthy system.</text>
<text class="ts" x="60" y="654">Content system is working.</text>

<g class="c-amber"><rect x="243" y="594" width="195" height="72" rx="8" stroke-width="0.5"/></g>
<text class="th" x="263" y="618">Disappeared on one</text>
<text class="ts" x="263" y="638">Content drift.</text>
<text class="ts" x="263" y="654">UX queue or retrieval layer.</text>

<g class="c-coral"><rect x="446" y="594" width="194" height="72" rx="8" stroke-width="0.5"/></g>
<text class="th" x="466" y="618">Disappeared on 2+</text>
<text class="ts" x="466" y="638">System failure.</text>
<text class="ts" x="466" y="654">User pays the integration tax.</text>
</svg>
